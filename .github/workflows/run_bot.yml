name: Klise Bot Run
on:
  schedule:
    - cron: '*/30 * * * *'  # Spustí se samo každých 30 minut
  workflow_dispatch:        # Umožní ti to spustit ručně tlačítkem v záložce Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:            # Tohle je pojistka pro ten zápis (exit code 128)
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      - name: Run bot
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python bot.py
      - name: Save seen IDs
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add seen_ids.txt || echo "No file to add"
          git commit -m "Update seen IDs" || exit 0
          git push
